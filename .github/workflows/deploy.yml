name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: test processor
        run: |
          pip install pandas numpy psycopg2-binary pytest -q
          pytest processor/tests.py -v

      - name: test api
        run: |
          pip install fastapi databases asyncpg pytest httpx -q
          pytest api/tests.py -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1
      ECS_CLUSTER: sensor-cluster
      API_SERVICE: sensor-api
      FRONTEND_SERVICE: sensor-frontend
      PROCESSOR_TASK_DEF: sensor-processor
      ECR_API_REPO: sensor/api
      ECR_FRONTEND_REPO: sensor/frontend
      ECR_PROCESSOR_REPO: sensor/processor

    steps:
      - uses: actions/checkout@v4

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── RESET ECS SERVICES ───────────────────────────────────
      # Drain all stacked deployments before pushing new images.
      # This prevents 3-deployment pile-ups from rapid pushes.
      - name: reset ECS services
        shell: bash
        run: |
          set -euo pipefail

          reset_service() {
            local service="$1"
            local desired="$2"

            echo "--- Resetting $service ---"

            # Scale down to 0 to drain all tasks and clear stacked deployments
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$service" \
              --desired-count 0 \
              --region "$AWS_REGION" > /dev/null

            echo "Waiting for $service tasks to drain..."
            for ((i=1; i<=20; i++)); do
              running=$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$service" \
                --region "$AWS_REGION" \
                --query 'services[0].runningCount' \
                --output text)
              pending=$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$service" \
                --region "$AWS_REGION" \
                --query 'services[0].pendingCount' \
                --output text)
              echo "  attempt $i/20 :: running=$running pending=$pending"
              if [ "$running" = "0" ] && [ "$pending" = "0" ]; then
                echo "$service fully drained"
                break
              fi
              sleep 10
            done

            # Restore desired count — deployment will happen after image push
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$service" \
              --desired-count "$desired" \
              --region "$AWS_REGION" > /dev/null

            echo "$service reset complete"
          }

          reset_service "$API_SERVICE" 2
          reset_service "$FRONTEND_SERVICE" 1

      # ── BUILD & PUSH API ──────────────────────────────────────
      - name: build and push api
        run: |
          docker build \
            -t ${{ steps.ecr.outputs.registry }}/${{ env.ECR_API_REPO }}:${{ github.sha }} \
            ./api

          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_API_REPO }}:${{ github.sha }}

          docker tag \
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_API_REPO }}:${{ github.sha }} \
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_API_REPO }}:latest

          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_API_REPO }}:latest

      # ── BUILD & PUSH PROCESSOR ────────────────────────────────
      - name: build and push processor
        run: |
          docker build \
            -f processor/Dockerfile \
            -t ${{ steps.ecr.outputs.registry }}/${{ env.ECR_PROCESSOR_REPO }}:${{ github.sha }} \
            .

          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_PROCESSOR_REPO }}:${{ github.sha }}

          docker tag \
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_PROCESSOR_REPO }}:${{ github.sha }} \
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_PROCESSOR_REPO }}:latest

          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_PROCESSOR_REPO }}:latest

      # ── BUILD & PUSH FRONTEND ─────────────────────────────────
      - name: build and push frontend
        run: |
          docker build \
            -t ${{ steps.ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }} \
            ./frontend

          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}

          docker tag \
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }} \
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:latest

          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:latest

      # ── DEPLOY API & FRONTEND TO ECS ──────────────────────────
      - name: deploy api to ECS
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$API_SERVICE" \
            --force-new-deployment \
            --deployment-configuration "minimumHealthyPercent=0,maximumPercent=100" \
            --region "$AWS_REGION"

      - name: deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$FRONTEND_SERVICE" \
            --force-new-deployment \
            --deployment-configuration "minimumHealthyPercent=0,maximumPercent=100" \
            --region "$AWS_REGION"

      # ── SHOW STATUS BEFORE WAITING ────────────────────────────
      - name: show ECS status before waiting
        run: |
          echo "=== API service status ==="
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].{status:status,desired:desiredCount,running:runningCount,pending:pendingCount,deployments:deployments[*].{status:status,rolloutState:rolloutState,running:runningCount,pending:pendingCount,taskDef:taskDefinition},events:events[0:5].[createdAt,message]}' \
            --output json

          echo "=== Frontend service status ==="
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$FRONTEND_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].{status:status,desired:desiredCount,running:runningCount,pending:pendingCount,deployments:deployments[*].{status:status,rolloutState:rolloutState,running:runningCount,pending:pendingCount,taskDef:taskDefinition},events:events[0:5].[createdAt,message]}' \
            --output json

      # ── WAIT FOR SERVICES ─────────────────────────────────────
      - name: wait for services to stabilize
        shell: bash
        run: |
          set -euo pipefail

          wait_for_service() {
            local service="$1"
            local max_attempts=80
            local sleep_seconds=15

            echo "Waiting for service: $service"

            for ((i=1; i<=max_attempts; i++)); do
              desired=$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$service" \
                --region "$AWS_REGION" \
                --query 'services[0].desiredCount' \
                --output text)

              running=$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$service" \
                --region "$AWS_REGION" \
                --query 'services[0].runningCount' \
                --output text)

              pending=$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$service" \
                --region "$AWS_REGION" \
                --query 'services[0].pendingCount' \
                --output text)

              deployments=$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$service" \
                --region "$AWS_REGION" \
                --query 'length(services[0].deployments)' \
                --output text)

              rollout_state=$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$service" \
                --region "$AWS_REGION" \
                --query 'services[0].deployments[?status==`PRIMARY`].rolloutState | [0]' \
                --output text)

              echo "Attempt $i/$max_attempts :: service=$service desired=$desired running=$running pending=$pending deployments=$deployments rollout=$rollout_state"

              if [ "$deployments" = "1" ] && [ "$running" = "$desired" ] && [ "$pending" = "0" ] && [ "$rollout_state" = "COMPLETED" ]; then
                echo "Service $service is stable"
                return 0
              fi

              sleep "$sleep_seconds"
            done

            echo "Service $service failed to stabilize in time"
            echo "Recent ECS events for $service:"
            aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$service" \
              --region "$AWS_REGION" \
              --query 'services[0].events[0:20].[createdAt,message]' \
              --output table

            return 1
          }

          wait_for_service "$API_SERVICE"
          wait_for_service "$FRONTEND_SERVICE"

      # ── DUMP EVENTS ON FAILURE ────────────────────────────────
      - name: dump ECS events on failure
        if: ${{ failure() }}
        run: |
          echo "=== API failure details ==="
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].events[0:20].[createdAt,message]' \
            --output table

          echo "=== Frontend failure details ==="
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$FRONTEND_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].events[0:20].[createdAt,message]' \
            --output table

      # ── GET NETWORK CONFIG FOR PROCESSOR ─────────────────────
      - name: get network config for processor
        id: network
        shell: bash
        run: |
          set -euo pipefail

          SUBNETS=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' \
            --output text | tr '\t' ',')

          SGS=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' \
            --output text | tr '\t' ',')

          echo "subnets=$SUBNETS" >> "$GITHUB_OUTPUT"
          echo "security_groups=$SGS" >> "$GITHUB_OUTPUT"

      # ── RUN PROCESSOR ─────────────────────────────────────────
      - name: run processor
        shell: bash
        run: |
          set -euo pipefail

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$PROCESSOR_TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnets }}],securityGroups=[${{ steps.network.outputs.security_groups }}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text \
            --region "$AWS_REGION")

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "Failed to start processor task"
            exit 1
          fi

          echo "Processor task started: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Processor exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Processor failed — check CloudWatch logs: /ecs/sensor-processor"
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "$TASK_ARN" \
              --region "$AWS_REGION" \
              --query 'tasks[0].containers[*].{name:name,lastStatus:lastStatus,reason:reason,exitCode:exitCode}' \
              --output table
            exit 1
          fi

          echo "Processor completed successfully — data is in RDS, dashboard is live"