events {}

http {
    server {
        listen 80;

        # send /api/* to the python api
        location /api/ {
            proxy_pass http://api:8000;
        }

        location /health {
            proxy_pass http://api:8000;
        }

        # everything else goes to the frontend
        location / {
            proxy_pass http://frontend:80;
        }
    }
}
